<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
	<link rel="stylesheet" href="styles.css" />
	<script src="script1.js" defer></script>
</head>

	<h1>Заголовок1</h1>
	<h2>Заголовок2</h2>

	<blockquote>Зверя нет сильнее птички, Старый Бог...</blockquote>
	<p>—Денис Медведeв, <cite>в 413 кабинете</cite></p>

	<button id="loadButton">Загрузить контент</button>
	
	<hr />
	<ul>
		<li>Пункт 1</li>
		<li>Пункт 2</li>
		<li>Пункт 3</li>
	</ul>
	<hr />
	<script>
	loadContent(){
		const xhr = new XMLHttpRequest();
		xhr.open('GET', 'content.html', true);
		xhr.onload = function() {
		  if (xhr.status === 200) {
		    document.getElementById('content-area').innerHTML = xhr.responseText;
		  } 
		  else {
		    console.error('Ошибка загрузки файла:', xhr.status);
		  }
		};
		xhr.onerror = function() {
		  console.error('Ошибка запроса');
		};
		xhr.send();
	}
	</script>
	<script>
	document.getElementById('loadButton').addEventListener('click', loadContent);
	</script>
	<div id="content-area"></div>
</body>
</html>
